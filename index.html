<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chroma Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0f;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            touch-action: manipulation; /* Prevents double-tap zoom */
            user-select: none; /* Prevents text selection on rapid taps */
        }
        canvas {
            display: block;
        }
        .neon-text-cyan {
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #00f3ff, 0 0 40px #00f3ff, 0 0 80px #00f3ff;
            color: #fff;
        }
        .neon-text-magenta {
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff0055, 0 0 40px #ff0055, 0 0 80px #ff0055;
            color: #fff;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas handler */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hidden { display: none !important; }
        .score-display {
            position: absolute;
            top: 20px;
            font-size: 3rem;
            font-weight: 900;
            opacity: 0.8;
            letter-spacing: 2px;
            z-index: 10;
        }
        
        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay -->
    <div id="scoreDisplay" class="ui-layer score-display">0</div>

    <!-- Start Screen -->
    <div id="startScreen" class="ui-layer bg-black/70 backdrop-blur-sm z-20 transition-opacity duration-300">
        <h1 class="text-6xl md:text-8xl font-black mb-4"><span class="neon-text-cyan">CHROMA</span><br><span class="neon-text-magenta">CORE</span></h1>
        <p class="text-xl md:text-2xl mt-8 mb-12 max-w-md px-6 text-gray-300">Tap, Click, or press Spacebar to flip your core. Match incoming orbs to your color.</p>
        <div class="text-2xl animate-pulse-glow text-white border-2 border-white/20 rounded-full px-8 py-3 bg-white/5">
            TAP TO IGNITE
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="ui-layer bg-black/80 backdrop-blur-md z-20 hidden transition-opacity duration-300">
        <h2 class="text-5xl md:text-7xl font-black text-red-500 mb-2 drop-shadow-[0_0_15px_rgba(239,68,68,0.8)]">SYSTEM FAILURE</h2>
        <p class="text-2xl mt-4 text-gray-400">FINAL SCORE</p>
        <p id="finalScore" class="text-7xl font-black neon-text-cyan mt-2 mb-12">0</p>
        <div class="text-xl animate-pulse-glow text-white border-2 border-white/20 rounded-full px-8 py-3 bg-white/5">
            TAP TO REBOOT
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const finalScoreDisplay = document.getElementById('finalScore');

    // Game Configuration
    const COLOR_CYAN = '#00f3ff';
    const COLOR_MAGENTA = '#ff0055';
    const BG_COLOR = '#0a0a0f';
    
    // State variables
    let width, height, centerX, centerY;
    let state = 'START'; // START, PLAYING, GAMEOVER
    let score = 0;
    let orbs = [];
    let particles = [];
    let spawnTimer = 0;
    let currentSpawnInterval = 100;
    let currentOrbSpeed = 2.5;
    let canRestart = false; // Prevents instant restart on death
    let screenShake = 0;

    // --- Audio System (Web Audio API Synthesizer) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = new AudioContext();

    function playTone(freq, type, duration, vol, slideToFreq = null) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (slideToFreq) {
            osc.frequency.exponentialRampToValueAtTime(slideToFreq, audioCtx.currentTime + duration);
        }
        
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const sfx = {
        match: () => {
            playTone(800, 'sine', 0.1, 0.1, 1200);
            playTone(1600, 'triangle', 0.15, 0.05);
        },
        flip: () => {
            playTone(150, 'sine', 0.1, 0.1, 300);
        },
        gameOver: () => {
            playTone(200, 'sawtooth', 0.6, 0.2, 50);
            playTone(150, 'square', 0.8, 0.2, 20);
        }
    };

    // --- Window Resizing ---
    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        centerX = width / 2;
        centerY = height / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Game Entities ---

    const player = {
        radius: 35,
        angle: 0,
        targetAngle: 0,
        colorTop: COLOR_CYAN,
        colorBottom: COLOR_MAGENTA,
        
        update: function() {
            // Smooth rotation interpolation
            this.angle += (this.targetAngle - this.angle) * 0.3;
        },
        
        draw: function() {
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(this.angle);

            // Top Half (Cyan)
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, Math.PI, 2 * Math.PI);
            ctx.fillStyle = this.colorTop;
            ctx.shadowColor = this.colorTop;
            ctx.shadowBlur = 25;
            ctx.fill();

            // Bottom Half (Magenta)
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI);
            ctx.fillStyle = this.colorBottom;
            ctx.shadowColor = this.colorBottom;
            ctx.shadowBlur = 25;
            ctx.fill();

            // Inner dark core
            ctx.beginPath();
            ctx.arc(0, 0, this.radius * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = BG_COLOR;
            ctx.shadowBlur = 0;
            ctx.fill();
            
            // Separation line
            ctx.beginPath();
            ctx.moveTo(-this.radius, 0);
            ctx.lineTo(this.radius, 0);
            ctx.strokeStyle = BG_COLOR;
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.restore();
        },
        
        flip: function() {
            this.targetAngle += Math.PI;
            sfx.flip();
        }
    };

    class Orb {
        constructor(speed) {
            const angle = Math.random() * Math.PI * 2;
            const spawnDist = Math.max(width, height) / 2 + 100;
            
            this.x = centerX + Math.cos(angle) * spawnDist;
            this.y = centerY + Math.sin(angle) * spawnDist;
            this.vx = -Math.cos(angle) * speed;
            this.vy = -Math.sin(angle) * speed;
            this.radius = 10;
            
            // 50% chance for either color
            this.isTopColor = Math.random() < 0.5;
            this.color = this.isTopColor ? player.colorTop : player.colorBottom;
            
            // Wobble effect
            this.wobblePhase = Math.random() * Math.PI * 2;
            this.baseVx = this.vx;
            this.baseVy = this.vy;
            this.orthoVx = -this.vy; // Orthogonal vector for wobble
            this.orthoVy = this.vx;
        }

        update() {
            this.wobblePhase += 0.1;
            const wobbleAmt = Math.sin(this.wobblePhase) * 0.3;
            
            this.x += this.baseVx + (this.orthoVx * wobbleAmt);
            this.y += this.baseVy + (this.orthoVy * wobbleAmt);
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; // bright white core
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 20;
            ctx.fill();
            
            // outer color halo
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 1.5, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.globalAlpha = 0.4;
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    class Particle {
        constructor(x, y, color, speedMultiplier = 1) {
            this.x = x;
            this.y = y;
            this.color = color;
            const angle = Math.random() * Math.PI * 2;
            const speed = (Math.random() * 6 + 2) * speedMultiplier;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 1.0;
            this.decay = Math.random() * 0.04 + 0.02;
            this.size = Math.random() * 4 + 2;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.95; // Friction
            this.vy *= 0.95;
            this.life -= this.decay;
        }

        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    function createExplosion(x, y, color, count = 15, speedMultiplier = 1) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x, y, color, speedMultiplier));
        }
    }

    // --- Core Game Logic ---

    function resetGame() {
        score = 0;
        orbs = [];
        particles = [];
        currentSpawnInterval = 120;
        currentOrbSpeed = 2.5;
        player.angle = 0;
        player.targetAngle = 0;
        scoreDisplay.innerText = score;
        scoreDisplay.classList.remove('hidden');
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        state = 'PLAYING';
    }

    function triggerGameOver() {
        state = 'GAMEOVER';
        sfx.gameOver();
        screenShake = 20;
        
        // Massive explosion at center
        createExplosion(centerX, centerY, player.colorTop, 40, 2);
        createExplosion(centerX, centerY, player.colorBottom, 40, 2);
        
        scoreDisplay.classList.add('hidden');
        finalScoreDisplay.innerText = score;
        gameOverScreen.classList.remove('hidden');
        
        // Prevent instant restart
        canRestart = false;
        setTimeout(() => { canRestart = true; }, 1000);
    }

    function drawBackgroundGrid() {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 1;
        const gridSize = 50;
        
        // Moving grid effect based on time
        const offset = (Date.now() / 50) % gridSize;

        ctx.beginPath();
        for (let x = offset; x < width; x += gridSize) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, height);
        }
        for (let y = offset; y < height; y += gridSize) {
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
        }
        ctx.stroke();
    }

    function gameLoop() {
        // Handle screen shake
        let dx = 0;
        let dy = 0;
        if (screenShake > 0) {
            dx = (Math.random() - 0.5) * screenShake;
            dy = (Math.random() - 0.5) * screenShake;
            screenShake *= 0.85; // Dampen
            if (screenShake < 0.5) screenShake = 0;
        }

        // Clear screen with motion blur trail
        ctx.fillStyle = `rgba(10, 10, 15, 0.4)`;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        ctx.translate(dx, dy);

        drawBackgroundGrid();
        
        // Update & Draw Particles
        ctx.globalCompositeOperation = 'screen'; // Additive blending for glows
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            }
        }
        ctx.globalCompositeOperation = 'source-over';

        if (state === 'PLAYING') {
            player.update();
            player.draw();

            // Spawning Logic
            spawnTimer++;
            if (spawnTimer >= currentSpawnInterval) {
                orbs.push(new Orb(currentOrbSpeed));
                spawnTimer = 0;
                
                // Difficulty Curve
                if (currentSpawnInterval > 30) currentSpawnInterval -= 1.5;
                if (currentOrbSpeed < 8) currentOrbSpeed += 0.04;
            }

            // Update & Check Orbs
            for (let i = orbs.length - 1; i >= 0; i--) {
                let o = orbs[i];
                o.update();
                o.draw();

                // Distance to center
                const distX = o.x - centerX;
                const distY = o.y - centerY;
                const distance = Math.sqrt(distX * distX + distY * distY);

                if (distance < player.radius + o.radius - 5) { // -5 for leniency
                    
                    // Collision Math
                    // 1. Find angle of incoming orb relative to center
                    const orbAngle = Math.atan2(distY, distX);
                    
                    // 2. Normalize relative angle taking player rotation into account
                    // Adding 4*PI ensures the value is positive before modulo
                    const relativeAngle = (orbAngle - player.angle + 4 * Math.PI) % (Math.PI * 2);
                    
                    // 3. The top half is visually drawn from PI to 2PI (left to right, clockwise)
                    const hitTopSide = relativeAngle >= Math.PI;
                    
                    // 4. Check if colors match
                    const matched = (hitTopSide && o.isTopColor) || (!hitTopSide && !o.isTopColor);

                    if (matched) {
                        score++;
                        scoreDisplay.innerText = score;
                        sfx.match();
                        createExplosion(o.x, o.y, o.color);
                        orbs.splice(i, 1);
                        
                        // Tiny scale pulse on player on hit
                        player.radius = 38;
                    } else {
                        triggerGameOver();
                    }
                }
            }
            
            // Return player radius to normal (elastic effect)
            if (player.radius > 35) {
                player.radius -= 0.5;
            }

        } else if (state === 'START') {
            player.update();
            player.draw();
        } else if (state === 'GAMEOVER') {
            // Player is invisible, particles just fade out
        }

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    // --- Input Handling ---

    function handleInteraction(e) {
        // Prevent default actions like spacebar scrolling
        if (e.type === 'keydown' && e.code === 'Space') e.preventDefault();
        
        // Only accept spacebar for keys
        if (e.type === 'keydown' && e.code !== 'Space') return;
        
        // Initialize Audio Context on first user gesture
        if (audioCtx.state === 'suspended') audioCtx.resume();

        if (state === 'START') {
            resetGame();
        } else if (state === 'PLAYING') {
            player.flip();
        } else if (state === 'GAMEOVER' && canRestart) {
            resetGame();
        }
    }

    window.addEventListener('mousedown', handleInteraction);
    window.addEventListener('touchstart', handleInteraction, {passive: false});
    window.addEventListener('keydown', handleInteraction);

    // Initialize
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
